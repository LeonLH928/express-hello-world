name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install --frozen-lockfile

    - name: Test
      run: yarn test

    - name: Build Docker image
      run: docker build -t express-hello-world .

    - name: Notify Success
      if: success()
      run: echo "Pipeline thành công! Docker image đã được build."

    - name: Notify Failure
      if: failure()
      run: echo "Pipeline thất bại! Vui lòng kiểm tra lại logs."
